architecture_task:
  description: >
    Review the PRD content: {prd_content}
    Design the system architecture and database schema using {tech_stack}.
    Include infrastructure diagrams (described in text) and data relationships.
  expected_output: >
    A detailed architecture and database design document in Bahasa Indonesia.
  agent: system_architect
  output_file: output/developer_1_system_architecture.md

api_spec_task:
  description: >
    Based on the PRD and architecture, define all API endpoints, request/response formats, and core business logic flows.
    Use {tech_stack} standards.
  expected_output: >
    A comprehensive API specification and backend logic document in Bahasa Indonesia.
  agent: backend_developer
  output_file: output/developer_2_api_specifications.md

frontend_plan_task:
  description: >
    Based on the PRD, define the frontend technical structure, including component hierarchy and state management using {tech_stack}.
  expected_output: >
    A detailed frontend technical specification in Bahasa Indonesia.
  agent: frontend_developer
  output_file: output/developer_3_frontend_specifications.md

technical_doc_consolidation_task:
  description: >
    Consolidate the architecture, API, and frontend plans into a single "Detailed Technical Document".
    Ensure consistency and technical accuracy using {tech_stack}.
    Use Bahasa Indonesia.
  expected_output: >
    A final Detailed Technical Document in Markdown format in Bahasa Indonesia.
  agent: system_architect
  output_file: output/developer_4_technical_document.md
